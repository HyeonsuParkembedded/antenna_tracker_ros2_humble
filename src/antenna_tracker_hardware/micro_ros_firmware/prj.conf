# Zephyr Configuration for Antenna Tracker micro-ROS Firmware
# Target: STM32H7A3ZI-Q Nucleo

# System
CONFIG_HEAP_MEM_POOL_SIZE=32768
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096

# micro-ROS
CONFIG_MICRO_ROS=y
CONFIG_MICRO_ROS_TRANSPORT_USB_CDC=y

# USB CDC ACM
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_CDC_ACM=y
CONFIG_USB_DEVICE_PRODUCT="Antenna Tracker MCU"
CONFIG_USB_DEVICE_VID=0x0483
CONFIG_USB_DEVICE_PID=0x5740

# I2C (BMI270 + MLX90393)
CONFIG_I2C=y
CONFIG_I2C_STM32=y

# UART (NEO-6M GPS)
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y

# Timer (Hall Encoder)
CONFIG_COUNTER=y
CONFIG_PWM=y

# CAN (ESP32 LoRa Bridge)
CONFIG_CAN=y
CONFIG_CAN_STM32FD=y

# GPIO (Motor DIR pins)
CONFIG_GPIO=y

# Floating Point
CONFIG_FPU=y
CONFIG_FPU_SHARING=y

# Logging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

# Shell (debug)
CONFIG_SHELL=n
